<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attachment Extractor</title>

  <!-- Office.js – MUST be loaded before anything else -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    /* ── DESIGN SYSTEM ──────────────────────────────── */
    :root {
      --bg:       #0d0f14;
      --surface:  #161a23;
      --border:   #252b38;
      --accent:   #3b82f6;
      --accent2:  #06b6d4;
      --ok:       #22c55e;
      --warn:     #f59e0b;
      --err:      #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --font:     'IBM Plex Mono', 'Courier New', monospace;
    }

    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }
    header .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    header h1 { font-size: 13px; font-weight: 600; letter-spacing: .05em; }
    header span { font-size: 10px; color: var(--muted); margin-left: auto; }

    /* ── MAIN AREA ───────────────────────────────────── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── SCAN BUTTON ─────────────────────────────────── */
    #scanBtn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    #scanBtn:hover:not(:disabled) { opacity: .88; }
    #scanBtn:active:not(:disabled) { transform: scale(.98); }
    #scanBtn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── STATUS BADGE ────────────────────────────────── */
    #statusBar {
      display: none;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      border-left: 3px solid;
    }
    #statusBar.ok  { background: #052212; border-color: var(--ok);  color: var(--ok); }
    #statusBar.err { background: #1f0808; border-color: var(--err); color: var(--err); }
    #statusBar.warn{ background: #1c1200; border-color: var(--warn);color: var(--warn);}

    /* ── ATTACHMENT LIST ──────────────────────────────── */
    #attachList { display: flex; flex-direction: column; gap: 6px; }

    .attach-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 11px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2px 8px;
      align-items: center;
      animation: slideIn .25s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .attach-card .name  { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attach-card .meta  { font-size: 10px; color: var(--muted); grid-column: 1; }
    .attach-card .badge {
      font-size: 9px; padding: 2px 6px;
      border-radius: 3px; font-weight: 600;
      background: #0f1e33; color: var(--accent2);
      border: 1px solid #1a3a5c;
      white-space: nowrap;
      grid-row: 1 / span 2;
    }

    /* ── ACTION ROW ─────────────────────────────────── */
    #actions {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    #endpointInput {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      outline: none;
      transition: border-color .2s;
    }
    #endpointInput:focus { border-color: var(--accent); }
    #endpointInput::placeholder { color: var(--muted); }

    .btn-row { display: flex; gap: 6px; }
    .action-btn {
      flex: 1;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, border-color .2s;
      letter-spacing: .06em;
    }
    .action-btn:hover { background: #1e2535; border-color: var(--accent); }
    .action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .action-btn.primary:hover { background: #2563eb; }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── LOG ─────────────────────────────────────────── */
    #logSection { display: none; flex-direction: column; gap: 4px; }
    #logSection h2 { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
    #logBox {
      background: #080a0e;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 10px;
      line-height: 1.7;
      max-height: 130px;
      overflow-y: auto;
      color: #94a3b8;
    }
    .log-ok   { color: var(--ok); }
    .log-err  { color: var(--err); }
    .log-warn { color: var(--warn); }
    .log-info { color: var(--accent2); }

    /* ── SCROLLBAR ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">📎</div>
    <h1>ATTACHMENT EXTRACTOR</h1>
    <span id="clock"></span>
  </header>

  <main>
    <button id="scanBtn">⟳ SCAN EMAIL FOR ATTACHMENTS</button>

    <div id="statusBar"></div>

    <div id="attachList"></div>

    <div id="actions">
      <input id="endpointInput" type="url"
             placeholder="https://your-endpoint.com/upload  (leave blank to download)"/>
      <div class="btn-row">
        <button class="action-btn" id="clearBtn">✕ Clear</button>
        <button class="action-btn primary" id="sendBtn">↑ Send / Download All</button>
      </div>
    </div>

    <div id="logSection">
      <h2>// process log</h2>
      <div id="logBox"></div>
    </div>
  </main>

  <script src="taskpane.js"></script>
</body>
</html>
